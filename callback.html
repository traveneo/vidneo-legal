<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vidneo — TikTok auth callback</title>
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
           max-width: 680px; margin: 48px auto; padding: 0 20px; line-height: 1.6; color: #1a1a1a; }
    h1 { font-size: 1.5rem; }
    .box { background: #f2f2f2; border: 1px solid #ddd; border-radius: 8px; padding: 14px;
           font-family: ui-monospace, Menlo, Consolas, monospace; word-break: break-all; margin: 10px 0; }
    .label { font-weight: 600; margin-top: 18px; }
    button { font-size: 1rem; padding: 8px 16px; border-radius: 6px; border: 1px solid #0a66c2;
             background: #0a66c2; color: #fff; cursor: pointer; }
    .err { color: #c0392b; }
    .ok { color: #1a7f37; }
  </style>
</head>
<body>
  <h1>Vidneo · TikTok authorization</h1>
  <p id="msg">Leyendo el código de autorización…</p>

  <div id="result" style="display:none">
    <div class="label">Authorization code (cópialo y pégalo en Claude / la terminal):</div>
    <div class="box" id="code"></div>
    <button onclick="copyCode()">Copiar code</button>

    <div class="label">state:</div>
    <div class="box" id="state"></div>
  </div>

  <script>
    const p = new URLSearchParams(window.location.search);
    const code = p.get('code');
    const state = p.get('state');
    const error = p.get('error') || p.get('error_description');
    const msg = document.getElementById('msg');
    if (error) {
      msg.innerHTML = '<span class="err">Error en la autorización: ' + error + '</span>';
    } else if (code) {
      msg.innerHTML = '<span class="ok">✓ Autorización recibida.</span> Copia el código de abajo.';
      document.getElementById('code').textContent = code;
      document.getElementById('state').textContent = state || '(sin state)';
      document.getElementById('result').style.display = 'block';
    } else {
      msg.innerHTML = '<span class="err">No se encontró ningún código en la URL.</span>';
    }
    function copyCode() {
      navigator.clipboard.writeText(code).then(() => {
        const b = document.querySelector('button');
        b.textContent = '¡Copiado!';
        setTimeout(() => b.textContent = 'Copiar code', 1500);
      });
    }
  </script>
</body>
</html>
